name: Build and Publish Docker Image

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - closed

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    if: github.event.pull_request.merged == true

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configura Docker BuildX (para buildear imágenes optimizadas)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Inicia sesión en Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Extrae metadatos de la imagen (tags, etiquetas)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/techstore
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      # 5. Construye y publica la imagen en Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Notificación de éxito (opcional)
      - name: Image published successfully
        run: |
          echo "✅ Docker image published to: ${{ secrets.DOCKER_USERNAME }}/techstore"
